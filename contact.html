<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngô Thanh Phong - Liên Hệ Và Gửi Thông Tin Phản Hồi</title>
    <meta name="description" content="Liên hệ với Ngô Thanh Phong thông qua biểu mẫu trực tuyến để gửi thông tin, góp ý, phản hồi hoặc trao đổi các nội dung học tập và công nghệ.">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>NGÔ THANH PHONG</h1>
        <p>Trang liên hệ</p>
    </header>

    <nav>
        <a href="index.html">Trang chủ</a> |
        <a href="about.html">Giới thiệu</a> |
        <a href="contact.html">Liên hệ</a>
    </nav>

    <main>

        <section>
            <h2>Liên hệ</h2>

            <form>

                <fieldset>
                    <legend>Thông tin cá nhân</legend>

                    <p>
                        <label for="hoten">Họ và tên:</label>
                        <input type="text"
                               id="hoten"
                               name="hoten"
                               required
                               minlength="2">
                    </p>

                    <p>
                        <label for="email">Email:</label>
                        <input type="email"
                               id="email"
                               name="email"
                               required>
                    </p>

                    <p>
                        <label for="sdt">Điện thoại:</label>
                        <input type="tel"
                               id="sdt"
                               name="sdt"
                               pattern="[0-9]{10,11}">
                    </p>
                    <p>
                        <label for="ngaysinh">Ngày sinh:</label>
                        <input type="date" id="ngaysinh" name="ngaysinh">
                    </p>
                    <p>
                        <label for="truong">Trường đại học:</label>
                        <input type="text"
                                id="truong"
                                name="truong"
                                list="dsTruong">
                    </p>
                    <datalist id="dsTruong">
                        <option value="Đại học An Giang">
                        <option value="Đại học Cần Thơ">
                        <option value="Đại học Bách Khoa TP.HCM">
                        <option value="Đại học Công nghệ Thông tin TP.HCM">
                    </datalist>

                </fieldset>

                <br>
                    <fieldset>
    <legend>Nội dung liên hệ</legend>

    <p>
        <label for="chude">Chủ đề:</label>
        <select id="chude" name="chude">
            <option>Học tập</option>
            <option>Tư vấn</option>
            <option>Khác</option>
        </select>
    </p>

    <p>Kênh liên hệ ưu tiên:</p>

    <input type="radio" id="email_radio" name="kenh" value="Email">
    <label for="email_radio">Email</label>

    <input type="radio" id="phone_radio" name="kenh" value="Phone">
    <label for="phone_radio">Phone</label>

    <input type="radio" id="zalo_radio" name="kenh" value="Zalo">
    <label for="zalo_radio">Zalo</label>

    <p>
        <label for="noidung">Nội dung liên hệ:</label><br>

        <textarea id="noidung"
                  name="noidung"
                  rows="5"
                  required
                  minlength="10"></textarea>
    </p>

    <p>
        <input type="checkbox"
               id="dongy"
               name="dongy"
               required>

        <label for="dongy">
            Tôi đồng ý với các điều khoản
        </label>
    </p>

</fieldset>

                </fieldset>

                <br>

                <button type="submit">Gửi</button>
                <button type="reset">Xóa</button>

            </form>

        </section>

    </main>

    <footer>

        <address>
            Email:
            <a href="mailto:phong@gmail.com">phong@gmail.com</a>
            <br>

            Điện thoại:
            <a href="tel:0912345678">0912345678</a>
        </address>

        <p>&copy; 2026 NGÔ THANH PHONG</p>

        <p>
            Cập nhật lần cuối:
            <time datetime="2026-06-24">24/06/2026</time>
        </p>

    </footer>

</body>

</html>
